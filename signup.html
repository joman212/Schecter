<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="icon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>

<header>
    <div class="logo">
        <a href="index.html">
            <img src="logo.png" alt="Schecter Guitars">
        </a>
    </div>
    <nav>
            <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="products.html">Guitars</a></li>
            <li><a href="a7x.html">A7X</a></li>
            <li><a href="#">Support</a></li>
            <li><a href="#">Contact</a></li>
            <li><a href="signup.html" class="btn">Sign Up</a></li>
            <li><a href="cart.html">
                <div class="cart-img"><img src="cart.png"> (<span id="cart-count">0</span>)
                </div>
            </a></li>
            </ul>
    </nav>
</header>

<section class="signup">
    <h1>Create an Account</h1>
    <form>
        <label for="name">Full Name:</label>
        <input type="text" id="name" required>

        <label for="email">Email:</label>
        <input type="email" id="email" required>

        <label for="password">Password:</label>
        <input type="password" id="password" required>

        <button type="submit" class="btn">Sign Up</button>
    </form>
</section>

<script>
    let cartCount = localStorage.getItem("cartCount") || 0;
    document.getElementById("cart-count").innerText = cartCount;
</script>

</body>
</html>
