<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Account - Schecter Guitars</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <div class="logo">
      <img src="logo.png" alt="Schecter Guitars">
    </div>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html">Guitars</a></li>
        <li><a href="Accessories.html">Accessories</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="support.html">Support</a></li>
        <li><a href="Contact.html">Contact</a></li>
        <li><a href="login.html">Sign In</a></li>
        <li>
          <a href="cart.html" class="cart-img">
            <img src="cart.png" alt="Cart">
            <span class="cart-count">0</span>
          </a>
        </li>
      </ul>
    </nav>
  </header>

  <main class="auth-wrapper">
    <div class="auth-card">
      <h1 class="auth-title">Create Account</h1>
      <p class="auth-subtitle">Join Schecter Guitars today</p>
      
      <form id="signupForm" class="auth-form">
        <div class="form-row">
          <div class="form-group">
            <label for="firstName">First Name</label>
            <input type="text" id="firstName" required placeholder="John">
          </div>
          <div class="form-group">
            <label for="lastName">Last Name</label>
            <input type="text" id="lastName" required placeholder="Doe">
          </div>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required minlength="6" placeholder="••••••••">
          <small class="form-hint">Minimum 6 characters</small>
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" required placeholder="••••••••">
        </div>
        <div class="form-group">
          <label class="terms-check">
            <input type="checkbox" id="terms" required>
            I agree to the <a href="#" target="_blank">Terms of Service</a> and <a href="#" target="_blank">Privacy Policy</a>
          </label>
        </div>
        <button type="submit" class="auth-btn">Create Account</button>
        <p class="auth-switch">Already have an account? <a href="login.html">Sign in</a></p>
      </form>
      <div id="signupMessage" class="auth-message"></div>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 Schecter Guitars. All rights reserved.</p>
  </footer>

  <script src="main.js"></script>
  <script>

  </script>
</body>
</html>
