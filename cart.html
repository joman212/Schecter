<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shopping Cart - Schecter Guitars</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Your Existing Navigation -->
  <nav>
    <a href="index.html">Home</a>
    <a href="products.html">Guitars</a>
    <a href="Accessories.html">Accessories</a>
    <a href="about.html">About</a>
    <a href="support.html">Support</a>
    <a href="Contact.html">Contact</a>
    <a href="signup.html">Sign Up</a>
    <a href="cart.html">🛒 <span class="cart-count">0</span></a>
  </nav>

  <!-- Main Content -->
  <main>
    <h1>Shopping Cart</h1>
    
    <!-- Cart Items Container (JavaScript will populate this) -->
    <div id="cartContainer">
      <p>Loading cart...</p>
    </div>
    
    <!-- Cart Summary -->
    <div id="cartSummary" style="display:none;">
      <p><strong>Total: $<span id="cartTotal">0.00</span></strong></p>
      <a href="Checkout.html" class="checkout-btn">Proceed to Checkout</a>
    </div>
  </main>

  <footer>
    <p>© 2026 Schecter Guitars. All rights reserved.</p>
  </footer>

  <!-- Load your existing main.js -->
  <script src="main.js"></script>
  
  <!-- Cart Rendering Script -->
  <script>
    // Render cart items from localStorage
    function renderCartDisplay() {
      const container = document.getElementById('cartContainer');
      const summary = document.getElementById('cartSummary');
      const totalEl = document.getElementById('cartTotal');
      
      if (!container) return;
      
      // Get cart from localStorage
      let cart = JSON.parse(localStorage.getItem('userCart')) || [];
      
      // Handle empty cart
      if (cart.length === 0) {
        container.innerHTML = '<p>Your cart is empty. <a href="products.html">Continue Shopping</a></p>';
        summary.style.display = 'none';
        return;
      }
      
      // Build cart HTML (matches your existing design)
      let html = '';
      let total = 0;
      
      cart.forEach((item, index) => {
        const itemTotal = (parseFloat(item.price) || 0) * (parseInt(item.quantity) || 1);
        total += itemTotal;
        
        html += `
          <div class="cart-item" data-index="${index}">
            <a href="${item.id}.html">${item.name}</a><br>
            Price: $${(parseFloat(item.price) || 0).toFixed(2)}<br>
            Quantity: <input type="number" min="1" value="${item.quantity || 1}" 
                   data-index="${index}" class="qty-input" style="width:50px;">
            <button class="remove-btn" data-index="${index}">Remove</button>
          </div>
        `;
      });
      
      container.innerHTML = html;
      totalEl.textContent = total.toFixed(2);
      summary.style.display = 'block';
      
      // Attach event listeners
      attachCartEventListeners();
      updateCartBadge();
    }
    
    // Event listeners for quantity & remove
    function attachCartEventListeners() {
      document.querySelectorAll('.qty-input').forEach(input => {
        input.addEventListener('change', function() {
          const index = this.dataset.index;
          const newQty = parseInt(this.value) || 1;
          updateCartItemQuantity(index, Math.max(1, newQty));
        });
      });
      
      document.querySelectorAll('.remove-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          const index = this.dataset.index;
          removeCartItem(index);
        });
      });
    }
    
    // Update item quantity
    function updateCartItemQuantity(index, newQuantity) {
      let cart = JSON.parse(localStorage.getItem('userCart')) || [];
      if (cart[index]) {
        cart[index].quantity = newQuantity;
        localStorage.setItem('userCart', JSON.stringify(cart));
        renderCartDisplay();
      }
    }
    
    // Remove item from cart
    function removeCartItem(index) {
      let cart = JSON.parse(localStorage.getItem('userCart')) || [];
      cart.splice(index, 1);
      localStorage.setItem('userCart', JSON.stringify(cart));
      renderCartDisplay();
      updateCartBadge();
    }
    
    // Update cart badge in navigation
    function updateCartBadge() {
      const cart = JSON.parse(localStorage.getItem('userCart')) || [];
      const badge = document.querySelector('.cart-count');
      const totalItems = cart.reduce((sum, item) => sum + (parseInt(item.quantity) || 1), 0);
      
      if (badge) {
        badge.textContent = totalItems;
      }
    }
    
    // Initialize on page load
    document.addEventListener('DOMContentLoaded', function() {
      renderCartDisplay();
    });
  </script>
</body>
</html>
