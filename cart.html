<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart - Schecter Guitars</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <div class="logo">
      <img src="logo.png" alt="Schecter Guitars">
    </div>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html">Guitars</a></li>
        <li><a href="Accessories.html">Accessories</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="support.html">Support</a></li>
        <li><a href="Contact.html">Contact</a></li>
        <li><a href="login.html">Sign In</a></li>
        <li>
          <a href="cart.html" class="cart-img">
            <img src="cart.png" alt="Cart">
            <span class="cart-count">0</span>
          </a>
        </li>
      </ul>
    </nav>
  </header>

  <main class="cart-wrapper">
    <h1 class="cart-title">Shopping Cart</h1>
    <div id="cartContainer"><p style="color:#E5E5E5;text-align:center;padding:3rem">Loading cart...</p></div>
    <div id="cartSummary" class="cart-summary" style="display:none">
      <div class="cart-total">Total: $<span id="cartTotal">0.00</span></div>
      <a href="Checkout.html" class="checkout-btn">Proceed to Checkout</a>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 Schecter Guitars. All rights reserved.</p>
    <div class="social-media-icons">
      <a href="#"><img src="fb.gif" alt="Facebook"></a>
      <a href="#"><img src="twitter.png" alt="Twitter"></a>
      <a href="#"><img src="instagram.png" alt="Instagram"></a>
      <a href="#"><img src="youtube.png" alt="YouTube"></a>
    </div>
  </footer>

  <script src="main.js"></script>
</body>
</html>
