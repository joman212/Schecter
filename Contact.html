<section class="contact">
    <h1>Contact</h1>
    
    <form action="contact2.html" method="GET">
        <div class="form-group">
            <label for="first-name">First Name *</label>
            <input type="text" id="first-name" name="first-name" required>
        </div>

        <div class="form-group">
            <label for="last-name">Last Name *</label>
            <input type="text" id="last-name" name="last-name" required>
        </div>

        <div class="form-group">
            <label for="email">Email *</label>
            <input type="email" id="email" name="email" required>
        </div>

        <div class="form-group">
            <label for="address">Address</label>
            <input type="text" id="address" name="address">
        </div>

        <div class="form-group">
            <label for="apartment">Apartment/Suite</label>
            <input type="text" id="apartment" name="apartment">
        </div>

        <div class="form-group">
            <label for="city">City</label>
            <input type="text" id="city" name="city">
        </div>

        <div class="form-group">
            <label for="phone">Phone No.</label>
            <input type="tel" id="phone" name="phone">
        </div>

        <div class="form-group">
            <label for="questions">Questions? *</label>
            <textarea id="questions" name="questions" required></textarea>
        </div>

        <p class="note">
            Submissions read and replied to during business hours:  
            <strong>Sunday through Friday 9am-5pm.</strong>  
            Your patience is appreciated!
        </p>

        <button type="submit" class="btn">Submit</button>
    </form>
</section>
