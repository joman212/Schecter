<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Account - Schecter Guitars</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <div class="logo">
      <img src="logo.png" alt="Schecter Guitars">
    </div>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html">Guitars</a></li>
        <li><a href="Accessories.html">Accessories</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="support.html">Support</a></li>
        <li><a href="Contact.html">Contact</a></li>
        <li><a href="login.html">Sign In</a></li>
        <li>
          <a href="cart.html" class="cart-img">
            <img src="cart.png" alt="Cart">
            <span class="cart-count">0</span>
          </a>
        </li>
      </ul>
    </nav>
  </header>

  <main class="auth-wrapper">
    <div class="auth-card">
      <h1 class="auth-title">Welcome Back</h1>
      <p class="auth-subtitle">Sign in to your Schecter account</p>
      
      <form id="loginForm" class="auth-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required placeholder="••••••••">
        </div>
        <div class="form-options">
          <label><input type="checkbox" id="remember"> Remember me</label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>
        <button type="submit" class="auth-btn">Sign In</button>
        <p class="auth-switch">Don't have an account? <a href="signup.html">Create one</a></p>
      </form>
      <div id="loginMessage" class="auth-message"></div>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 Schecter Guitars. All rights reserved.</p>
  </footer>

  <script src="main.js"></script>
  <script>

  </script>
</body>
</html>
